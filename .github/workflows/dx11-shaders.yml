name: dx11-shaders

# Manual trigger only. Builds shaderc on Windows (needed because the
# DXBC emit path inside shaderc calls into d3dcompiler_47.dll which
# only ships on Windows), runs make shaders-bgfx-dx11, and uploads
# the resulting Data/shaders/dx11/*.bin files as an artifact.
on:
  workflow_dispatch

permissions:
  contents: read

jobs:
  compile-dx11-shaders:
    name: Compile DX11 shaders (windows-latest)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2 (mingw64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            make
            mingw-w64-x86_64-gcc

      - name: Build shaderc (mingw)
        # --with-tools is required for genie to emit shaderc.make.
        # bgfx's mingw-gcc profile builds the compiler path as
        # ${MINGW}/bin/x86_64-w64-mingw32-gcc, so MINGW has to point
        # at the MSYS2 mingw64 root for the binaries to resolve.
        env:
          MINGW: /mingw64
        run: |
          cd theseus/third-party/bgfx
          ../bx/tools/bin/windows/genie.exe --with-tools --gcc=mingw-gcc gmake
          make -C .build/projects/gmake-mingw-gcc -j$(nproc) \
               shaderc config=release64

      - name: Locate shaderc binary
        run: find theseus/third-party/bgfx/.build -name 'shaderc*.exe' -o -name 'shaderc' 2>/dev/null

      - name: Compile DX11 shaders
        # The host shaderc just built has the bgfx_shader.sh include
        # paths baked in; point the Makefile at it explicitly.
        run: |
          SHADERC=$(find theseus/third-party/bgfx/.build -name 'shadercRelease*' -type f | head -1)
          echo "Using shaderc at: $SHADERC"
          SHADERC="$SHADERC" make -C build shaders-bgfx-dx11

      - name: Upload DX11 shader bins
        uses: actions/upload-artifact@v4
        with:
          name: bgfx-dx11-shaders
          path: Data/shaders/dx11/
          if-no-files-found: error
