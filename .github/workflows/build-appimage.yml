name: UIX Theseus builder
permissions:
  contents: read
on:
# Manual trigger, no automatic trigger here.
  workflow_dispatch

# All desktop targets build with bgfx: Metal on macOS, Vulkan on Linux / Windows.
# bgfx lives as a git submodule under theseus/third-party/; shaderc emits the
# per-backend shader bins into Data/shaders/{metal,spirv}/.

jobs:
  linux-build:
    runs-on: ubuntu-latest
    name: Build UIX Desktop (Linux build)
    container: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - name: Chekout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Dependencies
        run: |
          pacman -Syu --noconfirm \
          make     \
          base-devel \
          libdecor  \
          sdl2      \
          sdl2_mixer \
          mpv \
          vulkan-icd-loader \
          vulkan-headers \
          libx11
      - name: Build bgfx libs + shaderc
        run: |
          cd $GITHUB_WORKSPACE
          make -C theseus/third-party/bgfx -j$(nproc) linux-gcc-release64
      - name: Compile shaders (SPIR-V)
        run: |
          cd $GITHUB_WORKSPACE
          make -C build shaders-bgfx-spirv
      - name: Build UIX Desktop (Linux)
        run: |
          cd $GITHUB_WORKSPACE/build
          make DESKTOP_DIR=$GITHUB_WORKSPACE/UIX-Desktop desktop BGFX=1
      - name: Pack UIX-Desktop
        run: |
          echo "Cleaning up build"
          cd $GITHUB_WORKSPACE/UIX-Desktop
          rm -rf ./desktop
          rm -rf ./engine
          rm -rf ./render
          rm -rf ./shared
          rm -rf ./xbox
          echo "Zipping up and setting as artifact"
          cd $GITHUB_WORKSPACE
          tar -czvf "UIX-Desktop-Linux.tar.gz" UIX-Desktop
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: UIX-Desktop-Linux
          path: "./UIX-Desktop-Linux.tar.gz"
          archive: false

  macos-arm-build:
    name: Build UIX Desktop (MacOS Arm build)
    runs-on: macos-26
    steps:
        - name: Checkout repository
          uses: actions/checkout@v6
          with:
            submodules: recursive
        - name: Install Dependencies
          run: |
            brew install sdl2 sdl2_mixer
        - name: Build bgfx libs + shaderc
          run: |
            cd $GITHUB_WORKSPACE
            make -C theseus/third-party/bgfx -j$(sysctl -n hw.ncpu) osx-arm64-release
        - name: Compile shaders (Metal)
          run: |
            cd $GITHUB_WORKSPACE
            make -C build shaders-bgfx
        - name: Build UIX Desktop (MacOS Arm)
          run: |
            cd $GITHUB_WORKSPACE/build
            make desktop BGFX=1
        - name: Pack UIX-Desktop
          run: |
            echo "Cleaning up build"
            cd /Users/runner/builds/theseus/desktop
            rm -rf ./desktop
            rm -rf ./engine
            rm -rf ./render
            rm -rf ./shared
            rm -rf ./xbox

            echo "Zipping up and setting as artifact"
            mv /Users/runner/builds/theseus/desktop $GITHUB_WORKSPACE/UIX-Desktop
            cd $GITHUB_WORKSPACE
            zip -r "UIX-Desktop-MacOS.zip" UIX-Desktop
        - name: Upload artifact
          uses: actions/upload-artifact@v7
          with:
            name: UIX-Desktop-MacOS
            path: "./UIX-Desktop-MacOS.zip"
            archive: false

  macos-intel-build:
    runs-on: macos-26-intel
    name: Build UIX Desktop (MacOS Intel build)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Dependencies
        run: |
          brew install sdl2 sdl2_mixer
      - name: Build bgfx libs + shaderc
        run: |
          cd $GITHUB_WORKSPACE
          make -C theseus/third-party/bgfx -j$(sysctl -n hw.ncpu) osx-x64-release
      - name: Compile shaders (Metal)
        run: |
          cd $GITHUB_WORKSPACE
          make -C build shaders-bgfx
      - name: Build UIX Desktop (MacOS Intel)
        run: |
          cd $GITHUB_WORKSPACE/build
          make desktop BGFX=1
      - name: Pack UIX-Desktop
        run: |
          echo "Cleaning up build"
            cd /Users/runner/builds/theseus/desktop
            rm -rf ./desktop
            rm -rf ./engine
            rm -rf ./render
            rm -rf ./shared
            rm -rf ./xbox

            echo "Zipping up and setting as artifact"
            mv /Users/runner/builds/theseus/desktop $GITHUB_WORKSPACE/UIX-Desktop
            cd $GITHUB_WORKSPACE
            zip -r "UIX-Desktop-MacOS-Intel.zip" UIX-Desktop
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: UIX-Desktop-MacOS-Intel
          path: "./UIX-Desktop-MacOS-Intel.zip"
          archive: false

  windows-build:
    runs-on: ubuntu-latest
    name: Build UIX Desktop (Windows Build)
    container: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - name: Checkout Theseus repository
        uses: actions/checkout@v6
        with:
           path: Theseus
           submodules: recursive
      - name: Install Dependencies
        run: |
          pacman -Syu --noconfirm \
          make     \
          base-devel \
          libdecor  \
          sdl2      \
          sdl2_mixer \
          mingw-w64 \
          mingw-w64-crt \
          mingw-w64-gcc \
          wget \
          git \
          mingw-w64-binutils \
          vulkan-icd-loader \
          vulkan-headers \
          libx11 \
          zip
      - name: install SDL2 mingw libs
        run: |
          mkdir -p $GITHUB_WORKSPACE/sdl2-mingw
          wget https://libsdl.org/release/SDL2-devel-2.32.10-mingw.tar.gz
          wget https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.8.1/SDL2_mixer-devel-2.8.1-mingw.tar.gz
          echo "Extracting SDL blobs"
          tar -x -f SDL2-devel-2.32.10-mingw.tar.gz
          tar -x -f SDL2_mixer-devel-2.8.1-mingw.tar.gz
          echo "Moving blobs to required dir"
          cp -r ./SDL2-2.32.10 $GITHUB_WORKSPACE/sdl2-mingw
          cp -r ./SDL2_mixer-2.8.1 $GITHUB_WORKSPACE/sdl2-mingw
      - name: Build bgfx libs (mingw cross)
        run: |
          cd $GITHUB_WORKSPACE/Theseus
          make -C theseus/third-party/bgfx -j$(nproc) mingw-gcc-release64
      - name: Build shaderc (host Linux, for cross shader compile)
        run: |
          cd $GITHUB_WORKSPACE/Theseus
          make -C theseus/third-party/bgfx -j$(nproc) linux-gcc-release64
      - name: Compile shaders (SPIR-V)
        run: |
          cd $GITHUB_WORKSPACE/Theseus
          SHADERC=theseus/third-party/bgfx/.build/linux64_gcc/bin/shadercRelease make -C build shaders-bgfx-spirv
      - name: Build UIX Desktop (Windows)
        run: |
          ls $GITHUB_WORKSPACE/sdl2-mingw
          cd $GITHUB_WORKSPACE/Theseus/build
          make desktop-win64 BGFX=1 SDL2_MINGW_DIR=$GITHUB_WORKSPACE/sdl2-mingw
      - name: Pack UIX-Desktop
        run: |
          mv /github/home/builds/theseus/desktop-win64 $GITHUB_WORKSPACE/UIX-Desktop
          echo "Cleaning up build"
          cd $GITHUB_WORKSPACE/UIX-Desktop
          rm -rf ./desktop
          rm -rf ./engine
          rm -rf ./render
          rm -rf ./shared
          rm -rf ./xbox
          echo "Zipping up and setting as artifact"
          cd $GITHUB_WORKSPACE
          zip -r "UIX-Desktop-Win.zip" UIX-Desktop
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: UIX-Desktop-Win
          path: "./UIX-Desktop-Win.zip"
          archive: false


