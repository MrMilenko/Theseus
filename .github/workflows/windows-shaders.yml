name: windows-shaders

# Manual trigger. Downloads prebuilt shaderc.exe from bkaradzic/bgfx.cmake's
# Windows nightly, compiles the .sc files for DX11 (s_5_0) and DX9 (s_3_0),
# uploads both backends as separate artifacts.
on:
  workflow_dispatch

permissions:
  contents: read

jobs:
  compile-windows-shaders:
    name: Compile Windows shaders (dx11 + dx9)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch prebuilt shaderc
        shell: pwsh
        run: |
          $ver = (gh release view --repo bkaradzic/bgfx.cmake --json tagName -q .tagName)
          $url = "https://github.com/bkaradzic/bgfx.cmake/releases/download/$ver/bgfx.cmake.binary.windows.$ver.zip"
          curl.exe -fsSL -o bgfx.zip $url
          Expand-Archive bgfx.zip -DestinationPath bgfx-prebuilt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile DX11 shaders (s_5_0)
        shell: pwsh
        run: |
          $shaderc = "$pwd\bgfx-prebuilt\bgfx.cmake\bin\shaderc.exe"
          $inc     = "$pwd\bgfx-prebuilt\bgfx.cmake\include\bgfx"
          $srcDir  = "$pwd\theseus\desktop\shaders"
          $outDir  = "$pwd\Data\shaders\dx11"
          New-Item -ItemType Directory -Force $outDir | Out-Null
          Get-ChildItem "$srcDir\vs_*.sc" | ForEach-Object {
              $name = $_.BaseName
              Write-Host "shaderc [dx11] $name"
              & $shaderc -f $_.FullName -o "$outDir\$name.bin" `
                  --type v --platform windows --profile s_5_0 -i $inc
              if ($LASTEXITCODE -ne 0) { exit 1 }
          }
          Get-ChildItem "$srcDir\fs_*.sc" | ForEach-Object {
              $name = $_.BaseName
              Write-Host "shaderc [dx11] $name"
              & $shaderc -f $_.FullName -o "$outDir\$name.bin" `
                  --type f --platform windows --profile s_5_0 -i $inc
              if ($LASTEXITCODE -ne 0) { exit 1 }
          }

      - name: Compile DX9 shaders (s_3_0)
        # Continues on error: shaders that use SM4+ features (integer
        # bitwise ops in the FF packed-normal unpack, CRT phosphor mask)
        # will fail. The ones that do compile still upload as an artifact
        # so we can see how much of the dashboard works under D3D9.
        continue-on-error: true
        shell: pwsh
        run: |
          $shaderc = "$pwd\bgfx-prebuilt\bgfx.cmake\bin\shaderc.exe"
          $inc     = "$pwd\bgfx-prebuilt\bgfx.cmake\include\bgfx"
          $srcDir  = "$pwd\theseus\desktop\shaders"
          $outDir  = "$pwd\Data\shaders\dx9"
          New-Item -ItemType Directory -Force $outDir | Out-Null
          Get-ChildItem "$srcDir\vs_*.sc" | ForEach-Object {
              $name = $_.BaseName
              Write-Host "shaderc [dx9] $name"
              & $shaderc -f $_.FullName -o "$outDir\$name.bin" `
                  --type v --platform windows --profile s_3_0 -i $inc
          }
          Get-ChildItem "$srcDir\fs_*.sc" | ForEach-Object {
              $name = $_.BaseName
              Write-Host "shaderc [dx9] $name"
              & $shaderc -f $_.FullName -o "$outDir\$name.bin" `
                  --type f --platform windows --profile s_3_0 -i $inc
          }

      - name: Upload DX11 shader bins
        uses: actions/upload-artifact@v4
        with:
          name: bgfx-dx11-shaders
          path: Data/shaders/dx11/
          if-no-files-found: error

      - name: Upload DX9 shader bins
        uses: actions/upload-artifact@v4
        with:
          name: bgfx-dx9-shaders
          path: Data/shaders/dx9/
          if-no-files-found: warn
