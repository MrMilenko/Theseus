name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Hard deps for every desktop build:
#   SDL2, SDL2_mixer, libmpv, libcurl, pkg-config, bgfx (vendored).
# bgfx delivers Metal on macOS and Vulkan on Linux / Windows; shaders
# compile from .sc source via shaderc (built alongside the bgfx libs).

jobs:
  desktop-macos:
    name: Desktop / macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: brew install sdl2 sdl2_mixer mpv curl pkg-config

      - name: Stub Configs/Data/Library
        run: mkdir -p Configs Data Library

      - name: Build bgfx libs + shaderc
        run: make -C theseus/third-party/bgfx -j$(sysctl -n hw.ncpu) osx-arm64-release

      - name: Compile shaders (Metal)
        run: make -C build shaders-bgfx

      - name: Build
        # Homebrew curl is keg-only.
        run: PKG_CONFIG_PATH="$(brew --prefix curl)/lib/pkgconfig:${PKG_CONFIG_PATH}" make -C build desktop BGFX=1

      - name: Verify
        run: file ~/builds/theseus/desktop/theseus

  desktop-linux:
    name: Desktop / Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config \
                              libsdl2-dev libsdl2-mixer-dev \
                              libvulkan-dev libx11-dev \
                              libmpv-dev libcurl4-openssl-dev

      - name: Stub Configs/Data/Library
        run: mkdir -p Configs Data Library

      - name: Build bgfx libs + shaderc
        run: make -C theseus/third-party/bgfx -j$(nproc) linux-gcc-release64

      - name: Compile shaders (SPIR-V)
        run: make -C build shaders-bgfx-spirv

      - name: Build
        run: make -C build desktop BGFX=1

      - name: Verify
        run: file ~/builds/theseus/desktop/theseus

  desktop-linux-arm64:
    name: Desktop / Linux ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config \
                              libsdl2-dev libsdl2-mixer-dev \
                              libvulkan-dev libx11-dev \
                              libmpv-dev libcurl4-openssl-dev

      - name: Stub Configs/Data/Library
        run: mkdir -p Configs Data Library

      - name: Build GENie from source (ARM64 host)
        # bx ships prebuilt genie for linux x86_64 / darwin / windows only;
        # on aarch64 the kernel cant run the shipped x86 binary. Build from
        # source and drop it in place so bgfx's makefile finds it.
        run: |
          git clone --depth 1 https://github.com/bkaradzic/GENie.git /tmp/genie
          make -C /tmp/genie
          cp /tmp/genie/bin/linux/genie theseus/third-party/bx/tools/bin/linux/genie

      - name: Build bgfx libs + shaderc
        run: make -C theseus/third-party/bgfx -j$(nproc) linux-gcc-release64

      - name: Compile shaders (SPIR-V)
        run: make -C build shaders-bgfx-spirv

      - name: Build
        run: make -C build desktop BGFX=1

      - name: Verify
        run: file ~/builds/theseus/desktop/theseus

  # Windows binaries cross-compiled from Ubuntu via mingw-w64.
  # SDL2/SDL2_mixer/libcurl mingw devel are pulled from upstream tarballs;
  # libmpv comes from shinchiro's mpv-winbuild-cmake nightly archive
  # (no apt package). bgfx is cross-built with the same mingw toolchain.
  # The mingw thread model must be posix for libstdc++ <thread> support.
  desktop-win64:
    name: Desktop / Win64
    runs-on: ubuntu-latest
    env:
      SDL2_VER: 2.32.10
      SDL2_MIXER_VER: 2.8.1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install mingw-w64 (posix thread model)
        run: |
          sudo apt update
          sudo apt install -y mingw-w64 p7zip-full \
                              g++-mingw-w64-x86-64-posix \
                              gcc-mingw-w64-x86-64-posix
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Cache mingw devel libs
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ~/cross
          key: cross-mingw-sdl${{ env.SDL2_VER }}-mixer${{ env.SDL2_MIXER_VER }}-mpv-curl-v2

      - name: Fetch SDL2 + SDL2_mixer
        if: steps.cache-cross.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/cross/sdl2-mingw
          cd ~/cross/sdl2-mingw
          curl -fsSL -O https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_VER}/SDL2-devel-${SDL2_VER}-mingw.tar.gz
          curl -fsSL -O https://github.com/libsdl-org/SDL_mixer/releases/download/release-${SDL2_MIXER_VER}/SDL2_mixer-devel-${SDL2_MIXER_VER}-mingw.tar.gz
          tar xzf SDL2-devel-${SDL2_VER}-mingw.tar.gz
          tar xzf SDL2_mixer-devel-${SDL2_MIXER_VER}-mingw.tar.gz

      - name: Fetch libmpv mingw devel
        if: steps.cache-cross.outputs.cache-hit != 'true'
        timeout-minutes: 8
        run: |
          mkdir -p ~/cross/mpv-mingw
          cd ~/cross/mpv-mingw
          LATEST=$(curl -fsSL --max-time 30 \
                   https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest \
                   | grep -oE 'https://[^"]+mpv-dev-x86_64-[0-9]+-git-[0-9a-f]+\.7z' | head -1)
          test -n "$LATEST" || { echo "no shinchiro release found"; exit 1; }
          curl -fsSL --max-time 360 --speed-time 30 --speed-limit 1024 \
               -o mpv-dev.7z "$LATEST"
          7z x -y mpv-dev.7z

      - name: Fetch libcurl mingw devel
        if: steps.cache-cross.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/cross/curl-mingw
          cd ~/cross/curl-mingw
          # curl.se rotates URLs per release; scrape the index for current.
          INDEX_URL=https://curl.se/windows/
          ZIP_PATH=$(curl -fsSL "$INDEX_URL" | grep -oE 'dl-[0-9._]+/curl-[0-9._]+-win64-mingw\.zip' | head -1)
          test -n "$ZIP_PATH" || { echo "no curl mingw zip found"; exit 1; }
          curl -fsSL -o curl-mingw.zip "${INDEX_URL}${ZIP_PATH}"
          unzip -q curl-mingw.zip
          mv curl-*-win64-mingw/* . || true
          rmdir curl-*-win64-mingw 2>/dev/null || true

      - name: Stub Configs/Data/Library
        run: mkdir -p Configs Data Library

      - name: Build bgfx libs (mingw cross)
        # bgfx's "mingw-gcc-release64" rule builds every project in the
        # generated solution (incl. glslang / shaderc / spirv-tools).
        # glslang's Unix source pulls sys/resource.h which mingw doesnt
        # ship, so the all-target build dies. We only need the three
        # runtime libs for the Windows binary; the SPIR-V shaders are
        # cross-emitted by the host Linux shaderc later in this job.
        run: |
          cd theseus/third-party/bgfx
          ../bx/tools/bin/linux/genie --gcc=mingw-gcc gmake
          make -C .build/projects/gmake-mingw-gcc -j$(nproc) \
               bx bimg bgfx config=release64 \
               CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++

      - name: Build shaderc (host Linux, for cross shader compile)
        # shaderc runs on the host to emit SPIR-V; build the Linux flavor.
        run: |
          sudo apt install -y libvulkan-dev libx11-dev
          make -C theseus/third-party/bgfx -j$(nproc) linux-gcc-release64

      - name: Compile shaders (SPIR-V)
        # Use the host (Linux) shaderc binary to emit SPIR-V shaders that
        # the Windows runtime will load at startup.
        run: SHADERC=theseus/third-party/bgfx/.build/linux64_gcc/bin/shadercRelease make -C build shaders-bgfx-spirv

      - name: Build
        run: make -C build desktop-win64 BGFX=1

      - name: Verify
        run: file ~/builds/theseus/desktop-win64/theseus.exe
